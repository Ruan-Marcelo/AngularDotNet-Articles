<mat-toolbar [color]="themeService.getTheme()">
  <mat-toolbar-row fxLayout="row">
    <span class="title-center">{{ dialogData.action }} Categorias</span>
  </mat-toolbar-row>
</mat-toolbar>

<mat-dialog-content class="mat-typography">
  <form [formGroup]="categoryForm">
    <div fxFlex fxLayout="column">
      <div fxLayout="row wrap">
        <mat-form-field
          appearance="fill"
          fxFlex
          [color]="themeService.getTheme()"
        >
          <mat-label>Nome</mat-label>
          <input matInput formControlName="name" required />

          <mat-error
            *ngIf="
              categoryForm.controls.name.touched &&
              categoryForm.controls.name.invalid
            "
          >
            <span *ngIf="categoryForm.controls.name.errors.required">
              O Nome é obrigatório.
            </span>
            <span *ngIf="categoryForm.controls.name.errors.pattern">
              O Nome é inválido.
            </span>
          </mat-error>
        </mat-form-field>
      </div>
    </div>
  </form>
</mat-dialog-content>

<div class="dialog-actions" fxLayout="row" fxLayoutAlign="center center" style="margin-top:1rem;">
  <button mat-raised-button
          [color]="themeService.getTheme()"
          type="submit"
          (click)="handleSubmit()"
          [disabled]="!(categoryForm.valid && categoryForm.dirty)">
    {{ action }}
  </button>
  <button mat-raised-button
          [color]="themeService.getTheme()"
          mat-dialog-close
          style="margin-left: 0.5rem;">
    Fechar
  </button>
</div>
