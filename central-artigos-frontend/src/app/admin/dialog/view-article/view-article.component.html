<mat-toolbar [color]="themeService.getTheme()">
  <mat-toolbar-row fxLayout="row">
    <span class="title-center">Visualizar Artigo</span>
  </mat-toolbar-row>
</mat-toolbar>

<mat-dialog-content class="mat-typography">
  <div style="color:black;">Titulo: {{ article?.titulo }}
    <br>
    Categoria: {{ article?.categoriaName }}
    <br>
    Status: {{ article?.status }}
    <br>
  </div>
<div [innerHTML]="article?.conteudo | sanitizeHtml"></div>
</mat-dialog-content>

<mat-dialog-actions align="center">
  <button mat-raised-button [color]="themeService.getTheme()" mat-dialog-close >Fechar</button>
</mat-dialog-actions>
