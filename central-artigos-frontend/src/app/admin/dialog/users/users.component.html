<mat-toolbar [color]="themeService.getTheme()">
  <mat-toolbar-row fxLayout="row">
    <span class="title-center">{{ dialogData.action }} Usuários</span>
  </mat-toolbar-row>
</mat-toolbar>

<mat-dialog-content>
  <form [formGroup]="usersForm">
    <div fxFlex fxLayout="column">
      <div fxLayout="row wrap">
        <mat-form-field
          appearance="fill"
          fxFlex
          [color]="themeService.getTheme()"
        >
          <mat-label>Name</mat-label>
          <input matInput formControlName="name" required />

          <mat-error
            *ngIf="
              usersForm.controls.name.touched && usersForm.controls.name.invalid
            "
          >
            <span *ngIf="usersForm.controls.name.errors.required">
              O Nome é obrigatório.
            </span>
            <span *ngIf="usersForm.controls.name.errors.pattern">
              O Nome é inválido.
            </span>
          </mat-error>
        </mat-form-field>
      </div>

      <div fxLayout="row wrap">
        <mat-form-field
          appearance="fill"
          fxFlex
          [color]="themeService.getTheme()"
        >
          <mat-label>Email</mat-label>
          <input matInput formControlName="email" required />

          <mat-error
            *ngIf="
              usersForm.controls.email.touched &&
              usersForm.controls.email.invalid
            "
          >
            <span *ngIf="usersForm.controls.email.errors.required">
              O Email é obrigatório.
            </span>
            <span *ngIf="usersForm.controls.email.errors.pattern">
              O Email é inválido.
            </span>
          </mat-error>
        </mat-form-field>
      </div>
      <div *ngIf="dialogData.action === 'Add'">
        <div fxLayout="row wrap">
          <mat-form-field
            appearance="fill"
            fxFlex
            [color]="themeService.getTheme()"
          >
            <mat-label>Password</mat-label>
            <input matInput formControlName="password" required />

            <mat-error
              *ngIf="
                usersForm.controls.password.touched &&
                usersForm.controls.password.invalid
              "
            >
              <span *ngIf="usersForm.controls.password.errors.required">
                A Senha é obrigatória.
              </span>
              <span *ngIf="usersForm.controls.password.errors.pattern">
                A Senha é inválida.
              </span>
            </mat-error>
          </mat-form-field>
        </div>
      </div>
    </div>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="center">
  <button
    mat-raised-button
    [color]="themeService.getTheme()"
    type="submit"
    (click)="handleSubmit()"
    [disabled]="!(usersForm.valid && usersForm.dirty)"
  >
    {{ action }}
  </button>
  <button mat-raised-button [color]="themeService.getTheme()" mat-dialog-close>
    Fechar
  </button>
</mat-dialog-actions>
