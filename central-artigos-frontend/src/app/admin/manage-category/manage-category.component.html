<mat-card>
  <div>
    <b><span>Manage Category</span></b>
    <button
      mat-flat-button
      [color]="themeService.getTheme()"
      class="float-right"
      (click)="handleAddAction()"
    >
      Adicionar categoria
    </button>
  </div>
</mat-card>
<hr>
<mat-card>
  <mat-form-field appearance="outline" [color]="themeService.getTheme()">
    <mat-label>Filtrar Categories</mat-label>
    <input matInput (keyup)="applyFilter($event)" #input placeholder="Buscar Categoria...">
  </mat-form-field>
</mat-card>
<hr>
<div class="responsive_table">
  <table mat-table [dataSource]="dataSource" class="mat-elevation-1">
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>Nome</th>
      <td mat-cell *matCellDef="let element">{{ element.name }}</td>
    </ng-container>

    <ng-container matColumnDef="edit">
      <th mat-header-cell *matHeaderCellDef>Ações</th>
      <td mat-cell *matCellDef="let element" class="action-link">
        <button
          mat-icon-button
          [color]="themeService.getTheme()"
          matTooltip="Edit"
          (click)="handleEditAction(element)"
        >
          <mat-icon>edit</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns" sticky="true"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
</div>
