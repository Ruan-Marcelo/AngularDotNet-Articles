<mat-toolbar [color]="themeService.getTheme()">
  <button
    mat-icon-button
    *ngIf="sidenav.mode === 'side'"
    (click)="sidenav.toggle()"
  >
    <mat-icon *ngIf="!sidenav.opened">menu</mat-icon>
    <mat-icon *ngIf="sidenav.opened">close</mat-icon>
  </button>

  Central de artigos
  <span class="spacer"></span>

  <button mat-icon-button [matMenuTriggerFor]="menu">
    <mat-icon>palette</mat-icon>
  </button>

  <mat-menu #menu="matMenu">
    <button mat-fab color="primary" (click)="changeTheme('primary')">
      <mat-icon *ngIf="themeService.getTheme() === 'primary'">done</mat-icon>
    </button>

    <button mat-fab color="accent" (click)="changeTheme('accent')">
      <mat-icon *ngIf="themeService.getTheme() === 'accent'">done</mat-icon>
    </button>

    <button mat-fab color="warn" (click)="changeTheme('warn')">
      <mat-icon *ngIf="themeService.getTheme() === 'warn'">done</mat-icon>
    </button>
  </mat-menu>

  <button mat-icon-button (click)="logout()">
    <mat-icon>exit_to_app</mat-icon>
  </button>
</mat-toolbar>

<mat-sidenav-container>
  <mat-sidenav #sidenav opened="true" mode="side">
    <img
      src="../../../assets/profile.png"
      alt=""
      class="avatar-elevation-z8"
      class="avatar"
    />

    <mat-divider class="custom-divider"></mat-divider>

    <button
      mat-button
      class="menu-button"
      [color]="themeService.getTheme()"
      routerLinkActive="active"
      routerLink="/articleHub/dashboard"
    >
      <mat-icon>home</mat-icon>
      <span>Dashbard</span>
    </button>

    <button
      mat-button
      class="menu-button"
      [color]="themeService.getTheme()"
      routerLinkActive="active"
      routerLink="/articleHub/users"
    >
      <mat-icon>group</mat-icon>
      <span>User</span>
    </button>
    <button
      mat-button
      class="menu-button"
      [color]="themeService.getTheme()"
      routerLinkActive="active"
      routerLink="/articleHub/categoria"
    >
      <mat-icon>apartment</mat-icon>
      <span>Category</span>
    </button>
    <button
      mat-button
      class="menu-button"
      [color]="themeService.getTheme()"
      routerLinkActive="active"
      routerLink="/articleHub/artigo"
    >
      <mat-icon>storage</mat-icon>
      <span>Artigos</span>
    </button>

    <mat-divider class="custom-divider"></mat-divider>

    <button
      mat-button
      class="menu-button"
      [color]="themeService.getTheme()"
      routerLinkActive="active"
      routerLink="/articleHub/help"
    >
      <mat-icon>help</mat-icon>
      <span>Help</span>
    </button>
  </mat-sidenav>

  <mat-sidenav-content
    style="background: radial-gradient(circle at top, #243b55, #141e30)"
  >
    <div class="content mat-elevation-z8" style="background-color: #f0f0f0">
      <router-outlet></router-outlet>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
