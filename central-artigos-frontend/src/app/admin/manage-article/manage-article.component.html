<mat-card>
  <div>
    <b><span>Manage Article</span></b>
    <button
      mat-flat-button
      [color]="themeService.getTheme()"
      class="float-right"
      (click)="handleAddAction()"
    >
      Criar Artigos
    </button>
  </div>
</mat-card>
<hr />
<mat-card>
  <mat-form-field appearance="fill" [color]="themeService.getTheme()">
    <mat-label>Filtrar artigos</mat-label>
    <input
      matInput
      placeholder="Filtrar artigos..."
      (keyup)="applyFilter($event)"
    />
  </mat-form-field>
</mat-card>
<hr />
<div class="responsive_table">
  <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">
    <ng-container matColumnDef="titulo">
      <th mat-header-cell *matHeaderCellDef>Título</th>
      <td mat-cell *matCellDef="let element">{{ element.titulo }}</td>
    </ng-container>

    <ng-container matColumnDef="categoriaName">
      <th mat-header-cell *matHeaderCellDef>Categoria</th>
      <td mat-cell *matCellDef="let element">{{ element.categoriaName  }}</td>
    </ng-container>

    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let element">
        <mat-chip
          class="mat-chip-option-disabled"
          *ngIf="element.status != 'rascunho'"
          >Publicado</mat-chip
        >
        <mat-chip
          class="mat-chip-option-disabled-false"
          *ngIf="element.status === 'rascunho'"
          >Rascunho</mat-chip
        >
      </td>
    </ng-container>

    <ng-container matColumnDef="data_publicacao">
      <th mat-header-cell *matHeaderCellDef>Data de Publicação</th>
      <td mat-cell *matCellDef="let element">
        <span *ngIf="element.status != 'rascunho'">
          {{ element.data_publicacao | date: 'dd-MM-yyyy' }}
        </span>
      </td>
    </ng-container>

    <ng-container matColumnDef="edit">
      <th mat-header-cell *matHeaderCellDef>Ações</th>
      <td mat-cell *matCellDef="let element">
        <button mat-icon-button [color]="themeService.getTheme()" matTooltip="Visualizar" (click)="handleViewAction(element)">
          <mat-icon>visibility</mat-icon>
        </button>
        <button mat-icon-button [color]="themeService.getTheme()" matTooltip="Editar" (click)="handleEditAction(element)">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button [color]="themeService.getTheme()" matTooltip="Excluir" (click)="onDelete(element)">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns" sticky="true"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
</div>
